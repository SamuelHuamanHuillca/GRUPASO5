spring.application.name=Grupo5

# src/main/resources/application.properties

# ── Puerto ──────────────────────────────────────────
server.port=8082

# ── Base de datos MySQL (phpMyAdmin / XAMPP) ─────────
spring.datasource.url=jdbc:mysql://localhost:3306/grupo5_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────
# create-drop  → recrea tablas cada vez que arranca (útil en desarrollo)
# update       → solo actualiza si hay cambios (recomendado luego)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Swagger UI ───────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html